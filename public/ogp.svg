<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#0e0c0c"/>

  <!-- 左側の装飾ライン -->
  <rect x="60" y="60" width="4" height="510" fill="#8c1a1a"/>
  <rect x="60" y="60" width="80" height="4" fill="#8c1a1a"/>
  <rect x="60" y="566" width="80" height="4" fill="#8c1a1a"/>

  <!-- 右側の装飾ライン -->
  <rect x="1136" y="60" width="4" height="510" fill="#8c1a1a"/>
  <rect x="1060" y="60" width="80" height="4" fill="#8c1a1a"/>
  <rect x="1060" y="566" width="80" height="4" fill="#8c1a1a"/>

  <!-- 団扇（右側装飾） -->
  <g transform="translate(900, 315) scale(3.5)">
    <g stroke="#4a0a0a" stroke-width="0.9" stroke-linecap="round">
      <line x1="0" y1="13" x2="-11" y2="-2"/>
      <line x1="0" y1="13" x2="-7" y2="-8"/>
      <line x1="0" y1="13" x2="0"  y2="-10"/>
      <line x1="0" y1="13" x2="7"  y2="-8"/>
      <line x1="0" y1="13" x2="11" y2="-2"/>
    </g>
    <circle cx="0" cy="0" r="10.5" fill="#8c1010"/>
    <ellipse cx="-3" cy="-4" rx="4" ry="2.5" fill="#c03030" opacity="0.3" transform="rotate(-20 -3 -4)"/>
    <g stroke="#6a0808" stroke-width="0.8" stroke-linecap="round" opacity="0.6">
      <line x1="0" y1="10.5" x2="-10.5" y2="-2"/>
      <line x1="0" y1="10.5" x2="-6.5"  y2="-8"/>
      <line x1="0" y1="10.5" x2="0"     y2="-10"/>
      <line x1="0" y1="10.5" x2="6.5"   y2="-8"/>
      <line x1="0" y1="10.5" x2="10.5"  y2="-2"/>
    </g>
    <circle cx="0" cy="0" r="10.5" fill="none" stroke="#c83030" stroke-width="1.2"/>
    <rect x="-1.5" y="10" width="3" height="8" rx="1.5" fill="#c8a060"/>
  </g>

  <!-- メインテキスト -->
  <text x="140" y="260" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="88" font-weight="bold" fill="#ede8e0" letter-spacing="8">東方非想天則</text>
  <text x="140" y="380" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="72" font-weight="bold" fill="#c8201a" letter-spacing="6">天則勢100の質問</text>

  <!-- サブテキスト -->
  <text x="144" y="460" font-family="'Hiragino Kaku Gothic ProN','Meiryo',sans-serif" font-size="30" fill="#7a6060" letter-spacing="2">プレイヤー向けアンケートフォーム</text>

  <!-- URL -->
  <text x="144" y="540" font-family="'Hiragino Kaku Gothic ProN','Meiryo',sans-serif" font-size="22" fill="#4a3030" letter-spacing="1">ankakepizza551.github.io/tensoku-100q</text>
