<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景 -->
  <rect width="32" height="32" rx="6" fill="#0e0c0c"/>

  <!-- 団扇の骨 (柄の付け根 16,28 から放射) -->
  <g stroke="#7a1010" stroke-width="0.9" stroke-linecap="round">
    <line x1="16" y1="26" x2="5"  y2="11"/>
    <line x1="16" y1="26" x2="9"  y2="5"/>
    <line x1="16" y1="26" x2="16" y2="3"/>
    <line x1="16" y1="26" x2="23" y2="5"/>
    <line x1="16" y1="26" x2="27" y2="11"/>
  </g>

  <!-- 団扇の面 -->
  <circle cx="16" cy="13" r="10.5" fill="#b01818"/>

  <!-- 面の光沢ハイライト -->
  <ellipse cx="13" cy="9" rx="4" ry="2.5" fill="#d44040" opacity="0.35" transform="rotate(-20 13 9)"/>

  <!-- 骨を面の上に重ねて透かす -->
  <g stroke="#8c1010" stroke-width="0.8" stroke-linecap="round" opacity="0.6">
    <line x1="16" y1="23.5" x2="5.5"  y2="11"/>
    <line x1="16" y1="23.5" x2="9.5"  y2="5.5"/>
    <line x1="16" y1="23.5" x2="16"   y2="3.5"/>
    <line x1="16" y1="23.5" x2="22.5" y2="5.5"/>
    <line x1="16" y1="23.5" x2="26.5" y2="11"/>
  </g>

  <!-- 輪郭 -->
  <circle cx="16" cy="13" r="10.5" fill="none" stroke="#e84040" stroke-width="1.2"/>

  <!-- 柄 -->
  <rect x="14.5" y="22.5" width="3" height="8" rx="1.5" fill="#c8a060"/>
  <rect x="14.5" y="22.5" width="3" height="1.5" rx="0.5" fill="#a07840"/>
</svg>
